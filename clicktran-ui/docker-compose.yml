version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: clicktran
      POSTGRES_PASSWORD: clicktran
      POSTGRES_DB: clicktran
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://clicktran:clicktran@postgres:5432/clicktran
      JWT_SECRET: supersecret
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000/api
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      - backend

volumes:
  postgres-data:
